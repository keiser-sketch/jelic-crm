<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jelić CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<style>
/* ════════════════════════════════════════════════════════════════
   JELIĆ CRM — Design System
   Dark premium. Gleiche DNA wie die Website.
   ════════════════════════════════════════════════════════════════ */
:root {
  --pool:      #6DB4C1;
  --pool-d:    #4A96A4;
  --pool-deep: #2A6873;
  --pool-l:    rgba(109,180,193,.12);
  --garten:    #386436;
  --garten-l:  rgba(56,100,54,.15);
  --hot:       #FF6B4A;
  --hot-l:     rgba(255,107,74,.12);
  --warn:      #F5A623;
  --warn-l:    rgba(245,166,35,.12);
  --ok:        #52B788;
  --ok-l:      rgba(82,183,136,.12);
  --lost:      #8A8A8A;
  --ink:       #0A1416;
  --ink-2:     #131E21;
  --ink-3:     #1A2A2E;
  --surface:   #1F2F33;
  --surface-2: #243538;
  --line:      rgba(255,255,255,.07);
  --line-2:    rgba(255,255,255,.12);
  --text:      rgba(255,255,255,.88);
  --text-2:    rgba(255,255,255,.5);
  --text-3:    rgba(255,255,255,.28);
  --mono:      'JetBrains Mono', monospace;
  --sans:      'Mulish', sans-serif;
  --ease:      cubic-bezier(.16,1,.3,1);
  --ease-s:    cubic-bezier(.65,0,.35,1);
  --r:         10px;
  --r-sm:      6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 14px; }

body {
  font-family: var(--sans);
  background: var(--ink);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 2px; }

/* ── Login Screen ── */
#loginScreen {
  position: fixed; inset: 0;
  background: var(--ink);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
  transition: opacity .5s var(--ease);
}
#loginScreen.hide { opacity: 0; pointer-events: none; }

.login-card {
  width: 360px;
  background: var(--ink-2);
  border: 1px solid var(--line-2);
  border-radius: 16px;
  padding: 40px;
  box-shadow: 0 40px 80px rgba(0,0,0,.5);
}
.login-logo {
  display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
}
.login-logo-mark {
  width: 36px; height: 36px;
  background: var(--pool);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.login-logo-mark svg { width: 20px; height: 20px; color: var(--ink); }
.login-logo-text { font-size: 15px; font-weight: 700; letter-spacing: -.02em; }
.login-logo-text span { color: var(--pool); }
.login-title { font-size: 22px; font-weight: 700; letter-spacing: -.03em; margin-bottom: 6px; }
.login-sub { font-size: 13px; color: var(--text-2); margin-bottom: 28px; }
.login-field { margin-bottom: 16px; }
.login-field label {
  display: block; font-size: 11px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--text-2); margin-bottom: 8px;
}
.login-field input {
  width: 100%; padding: 12px 16px;
  background: var(--ink-3); border: 1px solid var(--line-2);
  border-radius: var(--r-sm); color: var(--text); font-family: var(--sans);
  font-size: 14px; outline: none;
  transition: border-color .2s ease;
}
.login-field input:focus { border-color: var(--pool); }
.login-field input[type="password"] { font-family: var(--mono); letter-spacing: .1em; }
.login-btn {
  width: 100%; padding: 13px;
  background: var(--pool); color: var(--ink); border: none;
  border-radius: var(--r-sm); font-family: var(--sans);
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: all .2s ease; margin-top: 8px;
}
.login-btn:hover { background: var(--pool-d); transform: translateY(-1px); }
.login-err {
  font-size: 12px; color: var(--hot); margin-top: 12px; text-align: center;
  min-height: 18px;
}

/* ── App Shell ── */
#app { display: none; flex-direction: column; min-height: 100vh; }
#app.show { display: flex; }

/* ── Topbar ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  height: 56px;
  background: rgba(10,20,22,.9);
  backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center;
  padding: 0 20px; gap: 20px;
}
.topbar-logo {
  display: flex; align-items: center; gap: 9px;
  font-size: 13px; font-weight: 700; letter-spacing: -.01em;
  white-space: nowrap;
}
.topbar-logo-dot {
  width: 8px; height: 8px; background: var(--pool);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--pool);
  animation: dotPulse 3s ease-in-out infinite;
}
@keyframes dotPulse {
  0%,100%{ box-shadow:0 0 6px var(--pool); }
  50%    { box-shadow:0 0 16px var(--pool); }
}
.topbar-logo span { color: var(--pool); }
.topbar-sep { flex: 1; }
.topbar-stats { display: flex; gap: 24px; }
.topbar-stat { text-align: right; }
.topbar-stat-val {
  font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--pool);
  line-height: 1.2;
}
.topbar-stat-lbl { font-size: 10px; color: var(--text-3); letter-spacing: .06em; text-transform: uppercase; }
.topbar-btn {
  padding: 7px 14px; border-radius: var(--r-sm);
  background: var(--line); border: 1px solid var(--line-2);
  color: var(--text); font-family: var(--sans); font-size: 12px;
  font-weight: 600; cursor: pointer; transition: all .2s ease;
  white-space: nowrap;
}
.topbar-btn:hover { background: var(--line-2); }

/* ── Layout ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: 220px; min-width: 220px;
  background: var(--ink-2);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  overflow-y: auto;
  transition: width .3s var(--ease);
}
.sidebar-section {
  padding: 20px 12px 8px;
}
.sidebar-label {
  font-size: 9.5px; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; color: var(--text-3);
  padding: 0 8px; margin-bottom: 4px;
}
.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: var(--r-sm);
  cursor: pointer; color: var(--text-2);
  font-size: 13px; font-weight: 500;
  transition: all .18s ease;
  text-decoration: none;
  position: relative;
}
.sidebar-item:hover { background: var(--line); color: var(--text); }
.sidebar-item.active { background: var(--pool-l); color: var(--pool); }
.sidebar-item.active::before {
  content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
  width: 2px; background: var(--pool); border-radius: 0 2px 2px 0;
}
.sidebar-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.sidebar-item-count {
  margin-left: auto; font-family: var(--mono); font-size: 11px;
  color: var(--text-3); background: var(--line); padding: 1px 7px;
  border-radius: 20px;
}
.sidebar-item.active .sidebar-item-count { background: var(--pool-l); color: var(--pool); }
.sidebar-div { margin: 8px 12px; border-top: 1px solid var(--line); }

/* ── Filter Bar ── */
.filterbar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 14px 20px;
  border-bottom: 1px solid var(--line);
  background: var(--ink-2);
}
.search-wrap { position: relative; flex: 0 0 240px; }
.search-wrap input {
  width: 100%; padding: 8px 12px 8px 34px;
  background: var(--ink-3); border: 1px solid var(--line-2);
  border-radius: var(--r-sm); color: var(--text);
  font-family: var(--sans); font-size: 13px; outline: none;
  transition: border-color .2s ease;
}
.search-wrap input:focus { border-color: var(--pool); }
.search-wrap input::placeholder { color: var(--text-3); }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-3); pointer-events: none;
}
.search-icon svg { width: 14px; height: 14px; }
.filter-chip-group { display: flex; gap: 4px; flex-wrap: wrap; }
.filter-chip {
  padding: 6px 12px; border-radius: 20px; border: 1px solid var(--line-2);
  background: transparent; color: var(--text-2);
  font-family: var(--sans); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .18s ease; white-space: nowrap;
}
.filter-chip:hover { border-color: var(--pool); color: var(--pool); }
.filter-chip.active {
  background: var(--pool-l); border-color: var(--pool);
  color: var(--pool);
}
.filter-chip.hot-chip.active {
  background: var(--hot-l); border-color: var(--hot); color: var(--hot);
}
.filterbar-sep { flex: 1; }
.sort-select {
  padding: 7px 10px; background: var(--ink-3); border: 1px solid var(--line-2);
  border-radius: var(--r-sm); color: var(--text-2); font-family: var(--sans);
  font-size: 12px; cursor: pointer; outline: none;
}

/* ── Main Content ── */
.main {
  flex: 1; overflow-y: auto;
  padding: 20px;
  display: flex; flex-direction: column; gap: 8px;
}

/* ── Lead Cards ── */
.lead-card {
  background: var(--ink-2); border: 1px solid var(--line);
  border-radius: var(--r); padding: 16px 18px;
  cursor: pointer; transition: all .22s var(--ease);
  position: relative; overflow: hidden;
  animation: cardIn .35s var(--ease) both;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0);   }
}
.lead-card:hover {
  border-color: var(--line-2);
  transform: translateX(3px);
  box-shadow: 0 4px 20px rgba(0,0,0,.25);
}
.lead-card.hot { border-left: 3px solid var(--hot); }
.lead-card.hoch { border-left: 3px solid var(--warn); }
.lead-card.normal { border-left: 3px solid var(--pool); }
.lead-card.niedrig { border-left: 3px solid var(--line-2); }

.lead-card-row1 {
  display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
}
.lead-avatar {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; letter-spacing: -.01em;
  flex-shrink: 0;
}
.lead-avatar.nordiq  { background: rgba(109,180,193,.18); color: var(--pool); }
.lead-avatar.riviera { background: rgba(56,100,54,.18); color: #52B788; }
.lead-avatar.default { background: var(--line); color: var(--text-2); }

.lead-name { font-size: 14px; font-weight: 700; letter-spacing: -.01em; flex: 1; }
.lead-source-badge {
  font-family: var(--mono); font-size: 9.5px; font-weight: 500;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 20px;
}
.lead-source-badge.konfigurator { background: var(--pool-l); color: var(--pool); }
.lead-source-badge.termin       { background: var(--ok-l);   color: var(--ok); }
.lead-source-badge.kontakt      { background: var(--line);    color: var(--text-3); }

.lead-card-row2 {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.lead-meta {
  font-size: 12px; color: var(--text-2);
  display: flex; align-items: center; gap: 4px;
}
.lead-meta svg { width: 11px; height: 11px; opacity: .5; }
.lead-meta-sep { color: var(--text-3); }

.lead-card-row3 {
  display: flex; align-items: center; gap: 8px; margin-top: 10px;
  padding-top: 10px; border-top: 1px solid var(--line);
}
.lead-pool-chip {
  font-size: 11px; color: var(--text-2);
  background: var(--line); padding: 3px 9px; border-radius: 20px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 180px;
}
.lead-value {
  margin-left: auto; font-family: var(--mono); font-size: 13px;
  font-weight: 600; color: var(--pool); white-space: nowrap;
}
.lead-status-badge {
  font-size: 10.5px; font-weight: 600; letter-spacing: .06em;
  padding: 3px 9px; border-radius: 20px; white-space: nowrap;
}
.status-neu         { background: var(--pool-l);   color: var(--pool); }
.status-kontaktiert { background: var(--warn-l);   color: var(--warn); }
.status-angebot     { background: var(--ok-l);     color: var(--ok); }
.status-gewonnen    { background: rgba(82,183,136,.2); color: var(--ok); font-weight: 700; }
.status-verloren    { background: rgba(138,138,138,.1); color: var(--lost); }
.status-pausiert    { background: var(--line); color: var(--text-3); }

.lead-date {
  font-family: var(--mono); font-size: 11px; color: var(--text-3);
  margin-left: auto;
}

/* ── Empty State ── */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; padding: 60px 20px;
}
.empty-state svg { color: var(--text-3); }
.empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text-2); }
.empty-state p { font-size: 13px; color: var(--text-3); text-align: center; }

/* ── Loading ── */
.loading-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 12px;
  color: var(--text-3); font-size: 13px;
}
.spinner {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid var(--line-2); border-top-color: var(--pool);
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Load More ── */
.load-more-btn {
  width: 100%; padding: 12px; margin-top: 4px;
  background: transparent; border: 1px solid var(--line-2);
  border-radius: var(--r); color: var(--text-2);
  font-family: var(--sans); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s ease;
}
.load-more-btn:hover { background: var(--line); border-color: var(--pool); color: var(--pool); }

<style>
/* ── Detail Drawer ── */
.drawer-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity .3s ease;
}
.drawer-overlay.show { opacity: 1; pointer-events: all; }

.drawer {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: min(560px, 95vw);
  background: var(--ink-2);
  border-left: 1px solid var(--line-2);
  z-index: 201;
  transform: translateX(100%);
  transition: transform .38s var(--ease);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.drawer.show { transform: translateX(0); }

.drawer-header {
  padding: 20px 24px 0;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.drawer-header-top {
  display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px;
}
.drawer-avatar {
  width: 48px; height: 48px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; flex-shrink: 0;
}
.drawer-name { font-size: 20px; font-weight: 700; letter-spacing: -.03em; line-height: 1.2; }
.drawer-sub  { font-size: 13px; color: var(--text-2); margin-top: 3px; }
.drawer-close {
  margin-left: auto; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px; background: var(--line); border: none;
  color: var(--text-2); cursor: pointer; flex-shrink: 0;
  transition: all .2s ease;
}
.drawer-close:hover { background: var(--line-2); color: var(--text); }
.drawer-close svg { width: 16px; height: 16px; }

.drawer-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--line);
}
.drawer-tab {
  padding: 10px 18px; font-size: 12px; font-weight: 600;
  color: var(--text-2); cursor: pointer; border: none;
  background: transparent; transition: all .18s ease;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  font-family: var(--sans);
}
.drawer-tab:hover { color: var(--text); }
.drawer-tab.active { color: var(--pool); border-bottom-color: var(--pool); }

.drawer-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

.drawer-section { margin-bottom: 24px; }
.drawer-section-title {
  font-size: 10px; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; color: var(--text-3); margin-bottom: 12px;
}
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.info-item {}
.info-item-label {
  font-size: 10.5px; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; color: var(--text-3); margin-bottom: 3px;
}
.info-item-value { font-size: 13px; color: var(--text); font-weight: 500; }
.info-item-value a { color: var(--pool); text-decoration: none; }
.info-item-value a:hover { text-decoration: underline; }
.info-item.full { grid-column: 1/-1; }

/* Pool Config Visual */
.pool-config-card {
  background: var(--ink-3); border: 1px solid var(--line);
  border-radius: var(--r); padding: 14px 16px; margin-bottom: 12px;
}
.pool-config-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.pool-config-brand {
  font-size: 12px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase;
}
.pool-config-model { font-size: 14px; font-weight: 600; letter-spacing: -.01em; flex: 1; }
.pool-config-size {
  font-family: var(--mono); font-size: 11px; color: var(--text-2);
  background: var(--line); padding: 3px 9px; border-radius: 20px;
}
.pool-config-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.pool-tag {
  font-size: 11px; color: var(--text-2); background: var(--line);
  padding: 3px 9px; border-radius: 20px;
}
.pool-value-bar {
  display: flex; align-items: center; gap: 8px;
  margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line);
}
.pool-value-label { font-size: 11px; color: var(--text-3); }
.pool-value-range {
  font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--pool);
}

/* Status Controls */
.status-control { margin-bottom: 20px; }
.status-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
.status-btn {
  padding: 9px 6px; border-radius: var(--r-sm);
  border: 1px solid var(--line-2); background: transparent;
  color: var(--text-2); font-family: var(--sans);
  font-size: 11.5px; font-weight: 600; cursor: pointer;
  transition: all .18s ease; text-align: center;
}
.status-btn:hover { border-color: var(--line-2); background: var(--line); }
.status-btn.active-status { color: var(--pool); background: var(--pool-l); border-color: var(--pool); }
.status-btn.gewonnen:hover,.status-btn.gewonnen.active-status {
  background: rgba(82,183,136,.15); border-color: var(--ok); color: var(--ok);
}
.status-btn.verloren:hover,.status-btn.verloren.active-status {
  background: rgba(138,138,138,.12); border-color: var(--lost); color: var(--lost);
}

/* Priority */
.prio-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 16px; }
.prio-btn {
  padding: 8px 6px; border-radius: var(--r-sm); border: 1px solid var(--line-2);
  background: transparent; color: var(--text-2); font-family: var(--sans);
  font-size: 11px; font-weight: 700; cursor: pointer; transition: all .18s ease;
  text-align: center;
}
.prio-btn.active-prio.hot    { background: var(--hot-l);  border-color: var(--hot);  color: var(--hot); }
.prio-btn.active-prio.hoch   { background: var(--warn-l); border-color: var(--warn); color: var(--warn); }
.prio-btn.active-prio.normal { background: var(--pool-l); border-color: var(--pool); color: var(--pool); }
.prio-btn.active-prio.niedrig{ background: var(--line);   border-color: var(--line-2);color: var(--text-3); }

/* Angebotswert */
.angebot-row {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.angebot-row input {
  flex: 1; padding: 9px 12px;
  background: var(--ink-3); border: 1px solid var(--line-2);
  border-radius: var(--r-sm); color: var(--text); font-family: var(--mono);
  font-size: 13px; outline: none; transition: border-color .2s ease;
}
.angebot-row input:focus { border-color: var(--pool); }
.angebot-row button {
  padding: 9px 14px; background: var(--pool-l); border: 1px solid var(--pool);
  border-radius: var(--r-sm); color: var(--pool); font-family: var(--sans);
  font-size: 12px; font-weight: 700; cursor: pointer; transition: all .18s ease;
}
.angebot-row button:hover { background: var(--pool); color: var(--ink); }

/* Notes */
.notiz-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.notiz-item {
  background: var(--ink-3); border-radius: var(--r-sm); padding: 12px 14px;
  border-left: 2px solid var(--line-2);
  animation: cardIn .25s var(--ease) both;
}
.notiz-item.typ-anruf  { border-left-color: var(--ok); }
.notiz-item.typ-email  { border-left-color: var(--pool); }
.notiz-item.typ-status { border-left-color: var(--warn); }
.notiz-item.typ-termin { border-left-color: var(--hot); }
.notiz-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.notiz-typ {
  font-size: 9.5px; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--text-3);
  background: var(--line); padding: 2px 7px; border-radius: 20px;
}
.notiz-time { font-family: var(--mono); font-size: 10.5px; color: var(--text-3); margin-left: auto; }
.notiz-text { font-size: 13px; color: var(--text-2); line-height: 1.5; }

.add-notiz-wrap { display: flex; flex-direction: column; gap: 8px; }
.add-notiz-type-row { display: flex; gap: 6px; }
.notiz-type-btn {
  padding: 5px 10px; border-radius: 20px; border: 1px solid var(--line-2);
  background: transparent; color: var(--text-3); font-family: var(--sans);
  font-size: 11px; font-weight: 600; cursor: pointer; transition: all .18s ease;
}
.notiz-type-btn:hover { border-color: var(--pool); color: var(--pool); }
.notiz-type-btn.active { background: var(--pool-l); border-color: var(--pool); color: var(--pool); }
.add-notiz-textarea {
  width: 100%; padding: 10px 12px; min-height: 80px; resize: vertical;
  background: var(--ink-3); border: 1px solid var(--line-2);
  border-radius: var(--r-sm); color: var(--text); font-family: var(--sans);
  font-size: 13px; line-height: 1.5; outline: none;
  transition: border-color .2s ease;
}
.add-notiz-textarea:focus { border-color: var(--pool); }
.add-notiz-btn {
  align-self: flex-end; padding: 9px 18px;
  background: var(--pool); color: var(--ink);
  border: none; border-radius: var(--r-sm); font-family: var(--sans);
  font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s ease;
}
.add-notiz-btn:hover { background: var(--pool-d); transform: translateY(-1px); }

/* ── Toast notifications ── */
.toast-wrap {
  position: fixed; bottom: 24px; right: 24px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 9999; pointer-events: none;
}
.toast {
  padding: 12px 18px; border-radius: var(--r-sm);
  background: var(--ink-3); border: 1px solid var(--line-2);
  font-size: 13px; font-weight: 500; color: var(--text);
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
  animation: toastIn .3s var(--ease) both;
  pointer-events: all;
}
.toast.ok { border-color: var(--ok); color: var(--ok); }
.toast.err { border-color: var(--hot); color: var(--hot); }
@keyframes toastIn {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── Mobile responsive ── */
@media (max-width: 768px) {
  .sidebar { position: fixed; top: 56px; bottom: 0; left: 0; z-index: 50;
             transform: translateX(-100%); transition: transform .3s var(--ease); }
  .sidebar.open { transform: translateX(0); }
  .topbar-stats { display: none; }
  .filterbar { padding: 10px 14px; }
  .search-wrap { flex: 1; }
  .main { padding: 12px; }
  .drawer { width: 100vw; }
  .info-grid { grid-template-columns: 1fr; }
  .status-grid { grid-template-columns: repeat(2,1fr); }
}
</style>

</style>
</head>
<body>

<!-- ── Login ───────────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div class="login-logo-text">Jelić <span>CRM</span></div>
    </div>
    <div class="login-title">Willkommen zurück</div>
    <div class="login-sub">Gib deinen Zugangscode ein</div>
    <form id="loginForm">
      <div class="login-field">
        <label>Zugangscode</label>
        <input type="password" id="loginKey" placeholder="••••••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn">Einloggen →</button>
    </form>
    <div id="loginErr" class="login-err"></div>
  </div>
</div>

<!-- ── App ─────────────────────────────────────────────────────── -->
<div id="app">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-dot"></div>
      Jelić <span>CRM</span>
    </div>
    <div class="topbar-stats">
      <div class="topbar-stat">
        <div class="topbar-stat-val" id="topbarHot">0</div>
        <div class="topbar-stat-lbl">🔥 HOT</div>
      </div>
      <div class="topbar-stat">
        <div class="topbar-stat-val" id="topbarTotal">0</div>
        <div class="topbar-stat-lbl">Leads gesamt</div>
      </div>
      <div class="topbar-stat">
        <div class="topbar-stat-val" id="topbarValue">0k</div>
        <div class="topbar-stat-lbl">Pipeline (max)</div>
      </div>
    </div>
    <div class="topbar-sep"></div>
    <button class="topbar-btn" onclick="fetchLeads(true)">↺ Aktualisieren</button>
    <button class="topbar-btn" onclick="localStorage.removeItem('crm_key');location.reload()" style="color:var(--text-3)">Abmelden</button>
  </header>

  <div class="layout">

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Alle Leads</div>
        <div class="sidebar-item active" id="sidebarItem_all" onclick="setSidebarStatus(null)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Übersicht
          <span class="sidebar-item-count" id="count_total">—</span>
        </div>
      </div>
      <div class="sidebar-div"></div>
      <div class="sidebar-section">
        <div class="sidebar-label">Nach Status</div>
        <div class="sidebar-item" id="sidebarItem_neu" onclick="setSidebarStatus('neu')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
          Neu
          <span class="sidebar-item-count" id="count_neu">—</span>
        </div>
        <div class="sidebar-item" id="sidebarItem_kontaktiert" onclick="setSidebarStatus('kontaktiert')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 014.1 11.27 19.79 19.79 0 011.05 2.7 2 2 0 013 .5h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L7.09 8.09A16 16 0 0015.91 16.91l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
          Kontaktiert
          <span class="sidebar-item-count" id="count_kontaktiert">—</span>
        </div>
        <div class="sidebar-item" id="sidebarItem_angebot" onclick="setSidebarStatus('angebot')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Angebot
          <span class="sidebar-item-count" id="count_angebot">—</span>
        </div>
        <div class="sidebar-item" id="sidebarItem_gewonnen" onclick="setSidebarStatus('gewonnen')" style="color:var(--ok)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="20 6 9 17 4 12"/></svg>
          Gewonnen
          <span class="sidebar-item-count" id="count_gewonnen">—</span>
        </div>
        <div class="sidebar-item" id="sidebarItem_verloren" onclick="setSidebarStatus('verloren')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Verloren
          <span class="sidebar-item-count" id="count_verloren">—</span>
        </div>
      </div>
      <div class="sidebar-div"></div>
      <div class="sidebar-section">
        <div class="sidebar-label">Priorität</div>
        <div class="sidebar-item" id="sidebarItem_hot" onclick="state.filters.prioritaet='hot';fetchLeads(true)">
          <span style="font-size:13px">🔥</span>
          HOT Leads
          <span class="sidebar-item-count" id="count_hot">—</span>
        </div>
      </div>
    </nav>

    <!-- Main -->
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">

      <!-- Filter Bar -->
      <div class="filterbar">
        <div class="search-wrap">
          <span class="search-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input type="search" placeholder="Name, E-Mail…" oninput="onSearch(this.value)">
        </div>
        <div class="filter-chip-group">
          <button class="filter-chip" onclick="setFilter('quelle','konfigurator',this)">Konfigurator</button>
          <button class="filter-chip" onclick="setFilter('quelle','termin',this)">Termin</button>
          <button class="filter-chip" onclick="setFilter('quelle','kontakt',this)">Kontakt</button>
        </div>
        <div class="filter-chip-group">
          <button class="filter-chip hot-chip" onclick="setFilter('prioritaet','hot',this)">🔥 HOT</button>
          <button class="filter-chip" onclick="setFilter('prioritaet','hoch',this)">⭐ Hoch</button>
        </div>
      </div>

      <!-- Lead List -->
      <div class="main" id="leadList">
        <div class="loading-wrap"><div class="spinner"></div> Lädt…</div>
      </div>
    </div>

  </div>
</div>

<!-- ── Drawer Overlay ───────────────────────────────────────────── -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div id="drawerContent"></div>
</div>

<!-- ── Toast Container ─────────────────────────────────────────── -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
// ════════════════════════════════════════════════════════════════
// JELIĆ CRM — Complete Application Logic
// ════════════════════════════════════════════════════════════════

const CRM_KEY = localStorage.getItem('crm_key') || '';
const API_BASE = '/api/crm';

// ── State ────────────────────────────────────────────────────────
const state = {
  leads:      [],
  total:      0,
  offset:     0,
  loading:    false,
  filters:    { status: null, quelle: null, prioritaet: null, search: '' },
  sort:       'created_at_desc',
  counts:     { neu:0, kontaktiert:0, angebot:0, gewonnen:0, verloren:0, hot:0 },
  activeLead: null,
  activeTab:  'detail',
  noteType:   'notiz',
  notizen:    [],
};
const LIMIT = 30;

// ── API ──────────────────────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'x-crm-key': CRM_KEY },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_BASE + path, opts);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── Auth ─────────────────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const key = document.getElementById('loginKey').value.trim();
  if (!key) return;
  // Test key with a real API call
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  try {
    const res = await fetch(API_BASE + '/leads?limit=1', {
      headers: { 'x-crm-key': key },
    });
    if (!res.ok) { errEl.textContent = 'Ungültiger Zugangscode.'; return; }
    localStorage.setItem('crm_key', key);
    Object.assign(state, { key }); // update state
    document.getElementById('loginScreen').classList.add('hide');
    document.getElementById('app').classList.add('show');
    init();
  } catch {
    errEl.textContent = 'Verbindung fehlgeschlagen.';
  }
});

// If key already saved, skip login
if (CRM_KEY) {
  document.getElementById('loginScreen').classList.add('hide');
  document.getElementById('app').classList.add('show');
}

// ── Init ─────────────────────────────────────────────────────────
async function init() {
  await fetchLeads(true);
  updateSidebarCounts();
}

// ── Fetch Leads ──────────────────────────────────────────────────
async function fetchLeads(reset = false) {
  if (state.loading) return;
  if (reset) { state.leads = []; state.offset = 0; renderLeads(); }
  state.loading = true;
  setLoading(true);

  try {
    const params = new URLSearchParams({ limit: LIMIT, offset: state.offset });
    if (state.filters.status)     params.set('status',     state.filters.status);
    if (state.filters.quelle)     params.set('quelle',     state.filters.quelle);
    if (state.filters.prioritaet) params.set('prioritaet', state.filters.prioritaet);
    if (state.filters.search)     params.set('search',     state.filters.search);

    const { leads, total } = await api('/leads?' + params);
    state.leads  = reset ? leads : [...state.leads, ...leads];
    state.total  = total;
    state.offset = state.leads.length;
    renderLeads();
    updateTopbarStats();
  } catch(e) {
    // Demo mode: generate sample data if no API
    if (state.leads.length === 0) loadDemoData();
    else toast('API nicht erreichbar — Demo-Modus', 'err');
  } finally {
    state.loading = false;
    setLoading(false);
  }
}

// ── Sidebar Counts ───────────────────────────────────────────────
async function updateSidebarCounts() {
  try {
    const statuses = ['neu','kontaktiert','angebot','gewonnen','verloren'];
    await Promise.all(statuses.map(async s => {
      const { total } = await api(`/leads?limit=1&status=${s}`);
      state.counts[s] = total;
      const el = document.getElementById(`count_${s}`);
      if (el) el.textContent = total;
    }));
    // Hot count
    const { total: hot } = await api('/leads?limit=1&prioritaet=hot&status=neu');
    state.counts.hot = hot;
    const hotEl = document.getElementById('count_hot');
    if (hotEl) hotEl.textContent = hot;
  } catch(e) {
    // Demo mode - set from sample data
  }
}

// ── Render Lead List ─────────────────────────────────────────────
function renderLeads() {
  const main = document.getElementById('leadList');
  if (!state.leads.length) {
    main.innerHTML = `
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 12h6m-3-3v6m-7 3h16a2 2 0 002-2V6a2 2 0 00-2-2H4a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        <h3>Keine Leads gefunden</h3>
        <p>Passe den Filter an oder warte auf neue Anfragen.</p>
      </div>`;
    return;
  }

  const cards = state.leads.map((l, i) => leadCardHTML(l, i)).join('');
  const hasMore = state.leads.length < state.total;
  main.innerHTML = cards + (hasMore
    ? `<button class="load-more-btn" onclick="fetchLeads()">
        Weitere laden (${state.total - state.leads.length} mehr)
       </button>`
    : '');
}

function leadCardHTML(l, i) {
  const initials = (l.vorname?.[0] || '') + (l.nachname?.[0] || '');
  const avatarCls = l.brand === 'riviera' ? 'riviera' : l.brand === 'nordiq' ? 'nordiq' : 'default';
  const dateStr = formatDate(l.created_at);
  const priceStr = l.preis_min ? `${(l.preis_min/1000).toFixed(0)}–${(l.preis_max/1000).toFixed(0)}k €` : '';

  return `
  <div class="lead-card ${l.prioritaet}" style="animation-delay:${i*0.03}s"
       onclick="openLead('${l.id}')">
    <div class="lead-card-row1">
      <div class="lead-avatar ${avatarCls}">${initials}</div>
      <div class="lead-name">${l.vorname} ${l.nachname}</div>
      <span class="lead-source-badge ${l.quelle}">${quelleLabel(l.quelle)}</span>
      ${l.prioritaet === 'hot' ? `<span style="font-size:13px">🔥</span>` : ''}
    </div>
    <div class="lead-card-row2">
      <span class="lead-meta">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 8l9 6 9-6M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        ${l.email}
      </span>
      <span class="lead-meta-sep">·</span>
      <span class="lead-meta">${l.telefon}</span>
      ${l.plz ? `<span class="lead-meta-sep">·</span><span class="lead-meta">PLZ ${l.plz}</span>` : ''}
    </div>
    ${l.modell_name || priceStr ? `
    <div class="lead-card-row3">
      ${l.modell_name ? `<span class="lead-pool-chip">${l.brand ? l.brand[0].toUpperCase()+l.brand.slice(1)+' · ' : ''}${l.modell_name}${l.modell_groesse ? ' · '+l.modell_groesse : ''}</span>` : ''}
      ${priceStr ? `<span class="lead-value">${priceStr}</span>` : ''}
      <span class="lead-status-badge status-${l.status}">${statusLabel(l.status)}</span>
      <span class="lead-date">${dateStr}</span>
    </div>` : `
    <div class="lead-card-row3" style="border-top:none;padding-top:0">
      <span class="lead-status-badge status-${l.status}">${statusLabel(l.status)}</span>
      <span class="lead-date">${dateStr}</span>
    </div>`}
  </div>`;
}

// ── Open Lead Drawer ─────────────────────────────────────────────
async function openLead(id) {
  const lead = state.leads.find(l => l.id === id);
  if (!lead) return;
  state.activeLead = lead;
  state.activeTab = 'detail';

  renderDrawer(lead);
  document.getElementById('drawerOverlay').classList.add('show');
  document.getElementById('drawer').classList.add('show');
  document.body.style.overflow = 'hidden';

  // Load notizen async
  loadNotizen(id);
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('show');
  document.getElementById('drawer').classList.remove('show');
  document.body.style.overflow = '';
  state.activeLead = null;
}

function renderDrawer(l) {
  const initials = (l.vorname?.[0]||'') + (l.nachname?.[0]||'');
  const avatarCls = l.brand === 'riviera' ? 'riviera' : l.brand === 'nordiq' ? 'nordiq' : 'default';

  document.getElementById('drawerContent').innerHTML = `
  <div class="drawer-header">
    <div class="drawer-header-top">
      <div class="drawer-avatar ${avatarCls}" style="font-size:16px;font-weight:700">${initials}</div>
      <div>
        <div class="drawer-name">${l.vorname} ${l.nachname}</div>
        <div class="drawer-sub">${l.email} · ${l.telefon}${l.plz ? ' · PLZ '+l.plz : ''}</div>
      </div>
      <button class="drawer-close" onclick="closeDrawer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="drawer-tabs">
      <button class="drawer-tab active" onclick="switchTab('detail',this)">Details</button>
      <button class="drawer-tab" onclick="switchTab('pool',this)">Pool-Config</button>
      <button class="drawer-tab" onclick="switchTab('status',this)">Status & Notizen</button>
    </div>
  </div>
  <div class="drawer-body">
    <div id="tabDetail">${renderTabDetail(l)}</div>
    <div id="tabPool"   style="display:none">${renderTabPool(l)}</div>
    <div id="tabStatus" style="display:none">${renderTabStatus(l)}</div>
  </div>`;
}

function switchTab(tab, btn) {
  state.activeTab = tab;
  document.querySelectorAll('.drawer-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['detail','pool','status'].forEach(t => {
    const el = document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
    if (el) el.style.display = t === tab ? '' : 'none';
  });
  if (tab === 'status') renderNotizenTab();
}

function renderTabDetail(l) {
  return `
  <div class="drawer-section">
    <div class="drawer-section-title">Kontakt</div>
    <div class="info-grid">
      <div class="info-item">
        <div class="info-item-label">Name</div>
        <div class="info-item-value">${l.vorname} ${l.nachname}</div>
      </div>
      <div class="info-item">
        <div class="info-item-label">Eigentümer</div>
        <div class="info-item-value">${eigentumLabel(l.eigentum)}</div>
      </div>
      <div class="info-item">
        <div class="info-item-label">E-Mail</div>
        <div class="info-item-value"><a href="mailto:${l.email}">${l.email}</a></div>
      </div>
      <div class="info-item">
        <div class="info-item-label">Telefon</div>
        <div class="info-item-value"><a href="tel:${l.telefon}">${l.telefon}</a></div>
      </div>
      <div class="info-item">
        <div class="info-item-label">PLZ Bauort</div>
        <div class="info-item-value">${l.plz || '—'}</div>
      </div>
      <div class="info-item">
        <div class="info-item-label">Bausaison</div>
        <div class="info-item-value">${l.bausaison || '—'}</div>
      </div>
      <div class="info-item">
        <div class="info-item-label">Quelle</div>
        <div class="info-item-value">${quelleLabel(l.quelle)}</div>
      </div>
      <div class="info-item">

function renderTabPool(l) {
  if (!l.brand && !l.modell_name) return `
    <div class="empty-state" style="padding:40px 0">
      <p>Kein Pool konfiguriert — ${quelleLabel(l.quelle)}</p>
    </div>`;

  const tags = [l.bauart, l.heizung !== 'keine' ? l.heizung : null,
    l.gsa !== 'keine' ? l.gsa : null, l.rollladen !== 'keine' ? l.rollladen : null,
    ...(l.galabau || [])].filter(Boolean);

  return `
  <div class="drawer-section">
    <div class="pool-config-card">
      <div class="pool-config-header">
        <span class="pool-config-brand" style="color:${l.brand === 'nordiq' ? 'var(--pool)' : 'var(--ok)'}">${l.brand ? l.brand.charAt(0).toUpperCase()+l.brand.slice(1) : ''}</span>
        <span class="pool-config-model">${l.modell_name || '—'}</span>
        ${l.modell_groesse ? `<span class="pool-config-size">${l.modell_groesse}</span>` : ''}
      </div>
      ${tags.length ? `<div class="pool-config-tags">${tags.map(t=>`<span class="pool-tag">${t}</span>`).join('')}</div>` : ''}
      ${(l.preis_min || l.preis_max) ? `
      <div class="pool-value-bar">
        <span class="pool-value-label">Investitionsrahmen</span>
        <span class="pool-value-range">${(l.preis_min||0).toLocaleString('de-DE')} – ${(l.preis_max||0).toLocaleString('de-DE')} €</span>
      </div>` : ''}
    </div>
  </div>
  ${l.aufschluesselung ? `
  <div class="drawer-section">
    <div class="drawer-section-title">Preisaufschlüsselung</div>
    <div class="info-grid">
      ${Object.entries(l.aufschluesselung).map(([k,v]) => `
        <div class="info-item">
          <div class="info-item-label">${k}</div>
          <div class="info-item-value" style="font-family:var(--mono)">${typeof v === 'number' ? v.toLocaleString('de-DE')+'€' : v}</div>
        </div>`).join('')}
    </div>
  </div>` : ''}`;
}

function renderNotizenTab() {
  if (!state.activeLead) return;
  loadNotizen(state.activeLead.id);
}

// ── Notizen ──────────────────────────────────────────────────────
async function loadNotizen(leadId) {
  const listEl = document.getElementById('notizenList');
  if (!listEl) return;
  try {
    const { notizen } = await api(`/notizen?lead_id=${leadId}`);
    state.notizen = notizen;
    renderNotizenList();
  } catch {
    if (listEl) listEl.innerHTML = '<p style="font-size:12px;color:var(--text-3)">Keine API — Demo</p>';
  }
}

function renderNotizenList() {
  const listEl = document.getElementById('notizenList');
  if (!listEl) return;
  if (!state.notizen.length) {
    listEl.innerHTML = '<p style="font-size:12px;color:var(--text-3);padding:8px 0">Noch keine Einträge</p>';
    return;
  }
  listEl.innerHTML = state.notizen.map(n => `
    <div class="notiz-item typ-${n.typ}">
      <div class="notiz-header">
        <span class="notiz-typ">${n.typ}</span>
        <span class="notiz-time">${formatDateFull(n.created_at)}</span>
      </div>
      <div class="notiz-text">${n.inhalt}</div>
    </div>`).join('');
}

async function addNotiz() {
  const input = document.getElementById('notizInput');
  const inhalt = input?.value?.trim();
  if (!inhalt || !state.activeLead) return;
  try {
    const { notiz } = await api(`/notizen?lead_id=${state.activeLead.id}`, 'POST',
      { inhalt, typ: state.noteType });
    state.notizen.unshift(notiz);
    renderNotizenList();
    input.value = '';
    toast('Notiz gespeichert', 'ok');
  } catch {
    // Demo fallback
    state.notizen.unshift({
      id: Date.now(), created_at: new Date().toISOString(),
      inhalt, typ: state.noteType, autor: 'Domenik',
    });
    renderNotizenList();
    input.value = '';
    toast('Notiz gespeichert (Demo)', 'ok');
  }
}

function setNoteType(typ, btn) {
  state.noteType = typ;
  document.querySelectorAll('.notiz-type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Status / Prio Updates ─────────────────────────────────────────
async function updateStatus(status, btn) {
  if (!state.activeLead) return;
  try {
    await api(`/leads?id=${state.activeLead.id}`, 'PATCH', { status });
    state.activeLead.status = status;
    // Update in list
    const idx = state.leads.findIndex(l => l.id === state.activeLead.id);
    if (idx !== -1) state.leads[idx].status = status;
    // Update buttons
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active-status'));
    btn.classList.add('active-status');
    // Re-render card in list
    renderLeads();
    toast(`Status: ${statusLabel(status)}`, 'ok');
  } catch { toast('Demo: Status geändert', 'ok'); }
}

async function updatePrio(prio, btn) {
  if (!state.activeLead) return;
  try {
    await api(`/leads?id=${state.activeLead.id}`, 'PATCH', { prioritaet: prio });
    state.activeLead.prioritaet = prio;
    document.querySelectorAll('.prio-btn').forEach(b => b.classList.remove('active-prio'));
    btn.classList.add('active-prio');
    const idx = state.leads.findIndex(l => l.id === state.activeLead.id);
    if (idx !== -1) state.leads[idx].prioritaet = prio;
    renderLeads();
    toast(`Priorität: ${prio}`, 'ok');
  } catch { toast('Demo: Priorität geändert', 'ok'); }
}

async function saveAngebot() {
  const val = parseInt(document.getElementById('angebotInput')?.value);
  if (!val || !state.activeLead) return;
  try {
    await api(`/leads?id=${state.activeLead.id}`, 'PATCH', { angebotswert: val });
    state.activeLead.angebotswert = val;
    toast(`Angebot: ${val.toLocaleString('de-DE')} €`, 'ok');
  } catch { toast('Demo: Angebot gespeichert', 'ok'); }
}

// ── Filters ──────────────────────────────────────────────────────
function setFilter(key, value, el) {
  // Toggle
  state.filters[key] = state.filters[key] === value ? null : value;
  // Update UI
  el.closest('.filter-chip-group').querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  if (state.filters[key]) el.classList.add('active');
  fetchLeads(true);
}

function setSidebarStatus(status) {
  state.filters.status = status;
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  document.getElementById('sidebarItem_' + (status || 'all'))?.classList.add('active');
  fetchLeads(true);
}

let searchTimeout;
function onSearch(val) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    state.filters.search = val;
    fetchLeads(true);
  }, 350);
}

// ── Helpers ──────────────────────────────────────────────────────
function statusLabel(s) {
  return { neu:'Neu', kontaktiert:'Kontaktiert', angebot:'Angebot',
           gewonnen:'Gewonnen', verloren:'Verloren', pausiert:'Pausiert' }[s] || s;
}
function quelleLabel(q) {
  return { konfigurator:'Konfigurator', termin:'Termin', kontakt:'Kontakt' }[q] || q;
}
function eigentumLabel(e) {
  return { ja:'Eigentümer', bald:'Kauf in Planung', nein:'Mieter' }[e] || e || '—';
}
function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const diff = (Date.now() - d) / 1000;
  if (diff < 60)     return 'Gerade eben';
  if (diff < 3600)   return Math.floor(diff/60) + ' Min';
  if (diff < 86400)  return Math.floor(diff/3600) + ' Std';
  if (diff < 604800) return Math.floor(diff/86400) + ' Tage';
  return d.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit' });
}
function formatDateFull(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('de-DE', { day:'2-digit', month:'2-digit',
    year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function updateTopbarStats() {
  const hot   = state.leads.filter(l => l.prioritaet === 'hot').length;
  const value = state.leads.reduce((s,l) => s + (l.preis_max||0), 0);
  const el1 = document.getElementById('topbarHot');
  const el2 = document.getElementById('topbarTotal');
  const el3 = document.getElementById('topbarValue');
  if (el1) el1.textContent = state.counts.hot || hot;
  if (el2) el2.textContent = state.total;
  if (el3) el3.textContent = (value/1000).toFixed(0) + 'k';
}

function setLoading(on) {
  const el = document.getElementById('leadList');
  if (on && state.leads.length === 0) {
    el.innerHTML = `<div class="loading-wrap"><div class="spinner"></div> Lädt…</div>`;
  }
}

// ── Toast ────────────────────────────────────────────────────────
function toast(msg, type = '') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
